# ============================================================
# UAT Environment Configuration
# ============================================================

# Application URLs (UAT may point to staging environment)
app.base.url=https://www.saucedemo.com
api.base.url=https://demoqa.com

# Browser Settings
browser=chrome
headless=true
browser.window.maximize=true

# Execution Mode
execution.mode=local
grid.url=http://localhost:4444

# Timeouts (seconds)
explicit.wait.timeout=20
fluent.wait.timeout=15
fluent.wait.polling=500
page.load.timeout=45
implicit.wait.timeout=0

# Test Credentials
standard.user=standard_user
locked.user=locked_out_user
problem.user=problem_user
glitch.user=performance_glitch_user
default.password=secret_sauce

# Reporting
report.title=E-Commerce Automation Report - UAT
report.name=UAT Smoke Run
screenshots.on.failure=true
screenshots.on.pass=false

# Logging
log.level=INFO
