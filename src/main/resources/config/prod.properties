# ============================================================
# Production Environment Configuration
# ============================================================
# WARNING: Production tests should be READ-ONLY smoke checks only.
# Never run destructive or write operations against production.

# Application URLs
app.base.url=https://www.saucedemo.com
api.base.url=https://demoqa.com

# Browser Settings
browser=chrome
headless=true
browser.window.maximize=true

# Execution Mode
execution.mode=remote
grid.url=http://selenium-grid:4444

# Timeouts (seconds) - More lenient for prod latency
explicit.wait.timeout=30
fluent.wait.timeout=20
fluent.wait.polling=1000
page.load.timeout=60
implicit.wait.timeout=0

# Test Credentials
standard.user=standard_user
locked.user=locked_out_user
problem.user=problem_user
glitch.user=performance_glitch_user
default.password=secret_sauce

# Reporting
report.title=E-Commerce Automation Report - PRODUCTION
report.name=Production Smoke Check
screenshots.on.failure=true
screenshots.on.pass=false

# Logging
log.level=WARN
