# ============================================================
# JUnit 5 Platform Configuration
# Parallel Execution Settings
# ============================================================

# Enable parallel test execution
junit.jupiter.execution.parallel.enabled=true

# Default mode: all tests run concurrently unless annotated otherwise
junit.jupiter.execution.parallel.mode.default=concurrent

# Class-level: all test classes run concurrently
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Thread pool strategy: fixed number of threads
junit.jupiter.execution.parallel.config.strategy=fixed

# Number of threads — set to match typical CI machine CPU count
# Override via Maven Surefire: -Djunit.jupiter.execution.parallel.config.fixed.parallelism=8
junit.jupiter.execution.parallel.config.fixed.parallelism=4

# Instance lifecycle: PER_METHOD (default) — each test method gets its own instance
# Change to PER_CLASS for shared setup across methods in a class
junit.jupiter.testinstance.lifecycle.default=per_method
